name: Build InkMind APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Install splash screen plugin
        run: |
          npm install @capacitor/splash-screen
          npx cap sync android

      - name: Copy splash screens
        run: |
          for density in ldpi mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/drawable-port-${density}
            cp assets/splash/drawable-port-${density}.png android/app/src/main/res/drawable-port-${density}/splash.png
          done

      - name: Copy app icons
        run: |
          for density in ldpi mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
            cp assets/icons/mipmap-${density}.png android/app/src/main/res/mipmap-${density}/ic_launcher.png
            cp assets/icons/mipmap-${density}.png android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InkMind-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
